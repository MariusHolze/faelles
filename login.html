<!DOCTYPE html>
<html lang="da">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log ind</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="navbar-placeholder"></div>
    <main class="page-content">
        <form id="login-form">
            <h1>Log ind</h1>

            <div class="container">
                <p>E-mail</p>
                <input type="email" id="brugerEmail" name="brugerEmail" placeholder="eksempel@eksempel.com" required>
            </div>

            <div class="container">
                <p>Adgangskode</p>
                <input type="password" id="oprettetAdgangskode" name="oprettetAdgangskode" required>
            </div>

            <div class="container">
                <button type="submit" id="login">Log ind</button>
            </div>

            <p>Har du ikke en profil?</p>
            <a href="opret.html" class="login-knap">Opret profil</a>
        </form>
    </main>

    <script src="script.js"></script>
</body>

</html>
