<!DOCTYPE html>
<html lang="da">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Driftsbudget</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="css/investeringscase.css">
</head>

<body>
  <div id="navbar-container"></div>

  <main class="cases-page">
    <section class="case-form-header">
      <p class="cases-label">Trin 4 af 5</p>
      <h1 id="caseTrinTitel">Driftsbudget</h1>
      <p id="caseTrinInfo">Valgt investeringscase indlæses...</p>
    </section>

    <form id="caseTrinForm" class="case-trin-form" data-trin="driftsbudget">
      <section class="case-help">
        <h2>Hjælp til input</h2>
        <p>
          Angiv de løbende driftsomkostninger for casen. Vælg selv posterne og
          om beløbet er pr. måned eller pr. år. Slet en post, hvis den ikke skal med.
        </p>
      </section>

      <div id="driftspostListe" class="driftspost-liste"></div>

      <button id="tilfoejDriftspostKnap" class="sekundaer-knap" type="button">
        + Tilføj driftsomkostning
      </button>

      <div class="case-total case-total-dobbelt">
        <span>Månedlig drift: <strong id="driftMaanedligTotal">0 kr.</strong></span>
        <span>Årlig drift: <strong id="driftAarligTotal">0 kr.</strong></span>
      </div>

      <p id="caseTrinFejl" class="case-form-fejl"></p>
      <p id="caseTrinStatus" class="case-form-status"></p>

      <div class="case-form-actions">
        <a id="forrigeTrinLink" class="sekundaer-link skjult" href="#">Forrige trin</a>
        <button id="naesteTrinKnap" class="case-primary-link skjult" type="submit" data-action="next">
          Gem og gå videre
        </button>
        <button type="submit">Gem</button>
      </div>
    </form>
  </main>

  <script src="js/storage.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/investeringscaseForm.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
