<!DOCTYPE html>
<html lang="da">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejendomsinvestering</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="forside-body">
    <!-- Navbar bliver indsættes dynamisk med JavaScript -->
    <div id="navbar-container"></div>

    <main class="page-content">
        <p class="eyebrow">Dansk Ejendomsinvestering</p>
        <h1>Find din næste investering</h1>
        <p class="forside-intro">Søg på en dansk adresse og få ejendomsdata, BBR-oplysninger og cashflow-beregninger på sekunder.</p>

        <div class="søgeområde">
            <form id="index-søge">
                <div class="søgefelt-wrapper">
                    <input id="index-søge-input" type="search" placeholder="Søg efter dansk adresse..." autocomplete="off">
                    <span class="søge-ikon" aria-hidden="true">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    </span>
                    <div id="adresseListe" class="skjult"></div>
                </div>
            </form>

            <!-- Fejlbesked ved søgning -->
            <p id="fejlBesked"></p>

            <!-- Søgeresultat -->
            <div id="søge-output">
                <div class="ejendom-kort forside-resultat skjult" id="resultatKort">
                    <div class="ejendom-kort-top">
                        <div>
                            <p class="eyebrow">Valgt adresse</p>
                            <h3 id="ejendomAdresse"></h3>
                        </div>
                        <span class="case-badge">Adresse fundet</span>
                    </div>

                    <dl class="ejendom-data-grid">
                        <div>
                            <dt>Postnummer og by</dt>
                            <dd id="ejendomPost"></dd>
                        </div>
                    </dl>

                    <div class="ejendom-knapper forside-knapper">
                        <button id="opretEjendomsprofilKnap" class="knap">
                            Opret ejendomsprofil
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="forside-stats">
            <div><strong>+2.400</strong><span>Analyserede ejendomme</span></div>
            <div><strong>30 år</strong><span>Fremskrivningshorisont</span></div>
            <div><strong>BBR</strong><span>Officielle data</span></div>
        </div>
    </main>

    <script src="js/ui.js"></script> <!-- ændrer DOM (vis/skjul osv.) -->
    <script src="js/adresse.js"></script> <!-- API kald til adresse -->
    <script src="js/app.js"></script> <!-- binder det hele sammen -->
</body>

</html>
