<!DOCTYPE html>
<html lang="da">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejendomsinvestering-app</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Navbar bliver indsættes dynamisk med JavaScript -->
    <div id="navbar-container"></div>

    <main class="page-content">
        <h1>Ejendomsinvestering-app</h1>

        <div class="søgeområde">
            <!-- Søgefelt på forsiden -->
            <form id="index-søge">
                <div class="søgefelt-wrapper">
                    <input id="index-søge-input" type="search" placeholder="Søg efter dansk adresse..." autocomplete="off">

                    <!-- Liste med adresseforslag -->
                    <div id="adresseListe"></div>
                </div>
            </form>

            <!-- Fejlbesked ved søgning -->
            <p id="fejlBesked"></p>

            <!-- Søgeresultat -->
            <div id="søge-output">
                <div class="resultat skjult" id="resultatKort">
                    <img src="img/house.png" alt="hus" id="resultat-logo">

                    <div id="ejendomsInfo">
                        <ul>
                            <li>
                                <p id="ejendsomType">Adresse fundet</p>
                            </li>
                            <li>
                                <p id="ejendomAdresse"></p>
                            </li>
                            <li>
                                <p id="ejendomPost"></p>
                            </li>
                            <li>
                                <p id="ejendomBeskrivelse"></p>
                            </li>
                            <li>
                                <button id="opretEjendomsprofilKnap" class="knap">
                                    Opret ejendomsprofil
                                </button>
                            </li>
                            <li>
                                <button id="visKortdataKnap" class="knap kortdata-knap" disabled>
                                    Kortdata
                                </button>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tidligere profiler -->
        <section class="bruger-section">
            <h2>Mine ejendomsprofiler</h2>
            <div id="ejendomListe"></div>
        </section>
    </main>

    <script src="js/storage.js"></script> <!-- håndterer localStorage -->
    <script src="js/ui.js"></script> <!-- ændrer DOM (vis/skjul osv.) -->
    <script src="js/auth.js"></script> <!-- login/logout logik -->
    <script src="js/ejendom.js"></script> <!-- API kald til ejendomme -->
    <script src="js/profil.js"></script> <!-- håndterer profilvisning -->
    <script src="js/adresse.js"></script> <!-- API kald til adresse -->
    <script src="js/kort.js"></script> <!-- kortmodal + kortdata -->
    <script src="js/app.js"></script> <!-- binder det hele sammen -->
</body>

</html>
