<!DOCTYPE html>
<html lang="da">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejendomsinvestering</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="forside-body">
    <!-- Navbar bliver indsættes dynamisk med JavaScript -->
    <div id="navbar-container"></div>

    <main class="page-content">
        <h1>Ejendomsinvestering</h1>
        <p class="forside-intro">Søg efter en dansk adresse for at se ejendomsdata, kortvisning og eksisterende investeringscases.</p>

        <div class="søgeområde">
            <!-- Søgefelt på forsiden -->
            <form id="index-søge">
                <div class="søgefelt-wrapper">
                    <input id="index-søge-input" type="search" placeholder="Søg efter dansk adresse..." autocomplete="off">

                    <!-- Liste med adresseforslag -->
                    <div id="adresseListe" class="skjult"></div>
                </div>
            </form>

            <!-- Fejlbesked ved søgning -->
            <p id="fejlBesked"></p>

            <!-- Søgeresultat -->
            <div id="søge-output">
                <div class="ejendom-kort forside-resultat skjult" id="resultatKort">
                    <div class="ejendom-kort-top">
                        <div>
                            <p class="eyebrow" id="ejendsomType">Valgt adresse</p>
                            <h3 id="ejendomAdresse"></h3>
                        </div>
                        <span class="case-badge">Adresse fundet</span>
                    </div>

                    <dl class="ejendom-data-grid">
                        <div>
                            <dt>Postnummer og by</dt>
                            <dd id="ejendomPost"></dd>
                        </div>
                        <div>
                            <dt>Status</dt>
                            <dd id="ejendomBeskrivelse"></dd>
                        </div>
                    </dl>

                    <div class="ejendom-knapper forside-knapper">
                        <button id="opretEjendomsprofilKnap" class="knap">
                            Opret ejendomsprofil
                        </button>
                        <button id="visKortdataKnap" class="knap kortdata-knap" disabled>
                            Kortdata
                        </button>
                        <button id="seCasesForEjendomKnap" class="knap" type="button" disabled>
                            Se cases
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

      <script src="js/ui.js"></script> <!-- ændrer DOM (vis/skjul osv.) -->
    <script src="js/ejendom.js"></script> <!-- API kald til ejendomme -->
    <script src="js/profil.js"></script> <!-- håndterer profilvisning -->
    <script src="js/adresse.js"></script> <!-- API kald til adresse -->
    <script src="js/kort.js"></script> <!-- kortmodal + kortdata -->
    <script src="js/app.js"></script> <!-- binder det hele sammen -->
</body>

</html>
