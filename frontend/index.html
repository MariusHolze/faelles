<!DOCTYPE html>
<html lang="da">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejendomsinvestering-app</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- navbar bliver hentet ind med JavaScript -->
  <div id="navbar-placeholder"></div>

  <main class="page-content">
    <h1>Ejendomsinvestering-app</h1>

    <div class="søgeområde">
      <!-- søgefelt på forsiden -->
      <form id="index-søge">
        <input id="index-søge-input" type="search" placeholder="Søg efter dansk adresse..." />
        <button type="submit" class="knap">Søg</button>
      </form>

      <!-- fejlbesked -->
      <p id="fejlBesked"></p>

      <!-- søgeresultat -->
      <div id="søge-output">
        <div class="resultat skjult" id="resultatKort">
          <img src="img/house.png" alt="hus" id="resultat-logo">

          <div id="ejendomsInfo">
            <ul>
              <li>
                <p id="ejendsomType">Adresse fundet</p>
              </li>
              <li>
                <p id="ejendomAdresse"></p>
              </li>
              <li>
                <p id="ejendomPost"></p>
              </li>
              <li>
                <p id="ejendomBeskrivelse"></p>
              </li>
              <li>
                <button id="opretEjendomsprofilKnap" class="knap">
                  Opret ejendomsprofil
                </button>
              </li>
            </ul>
          </div>
        </div>

        <div class="bruger-box">
          <button onclick="hentBrugere()" class="knap">Vis brugere</button>
          <ul id="brugerListe"></ul>
        </div>
      </div>
    </div>

    <!-- tidligere profiler -->
    <section class="bruger-section">
      <h2>Mine ejendomsprofiler</h2>
      <div id="ejendomListe"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>

</html>
