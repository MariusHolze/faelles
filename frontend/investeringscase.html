<!DOCTYPE html>
<html lang="da">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Investeringscases</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="css/investeringscase.css">
</head>

<body>
  <div id="navbar-container"></div>

  <main class="cases-page">
    <section class="cases-hero">
      <div class="cases-hero-text">
        <h1>Mine investeringscases</h1>
        <p>
          Her kan du oprette, se og redigere dine investeringscases.
          Du får et hurtigt overblik over dine cases og deres vigtigste oplysninger.
        </p>
      </div>

      <div class="opret-case-wrapper">
        <button id="opretCaseKnap" class="opret-case-knap" type="button">
          + Opret investeringscase
        </button>

        <div id="caseDropdown" class="case-dropdown skjult">
          <p class="case-dropdown-title">Vælg ejendomsprofil</p>
          <div id="caseDropdownListe" class="case-dropdown-liste"></div>
        </div>
      </div>
    </section>

    <section>
      <div class="case-section-toolbar">
        <div>
          <h2 class="case-section-title">Dine cases</h2>
          <p id="caseSammenlignStatus" class="case-section-help">Vælg mindst to cases for at sammenligne scenarier.</p>
        </div>
        <button id="sammenlignCasesKnap" class="case-primary-link" type="button" disabled>Sammenlign</button>
      </div>
      <div class="cases-grid" id="casesGrid"></div>
    </section>

  </main>

  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/investeringscase.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
