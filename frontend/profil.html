<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8"> <!-- korrekt tegnsæt -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- responsivt layout -->
  <title>Min profil</title>
  <link rel="stylesheet" href="style.css"> <!-- fælles styling -->
</head>

<body>
  <div id="navbar-container"></div> <!-- navbar indsættes via JS -->

  <main class="page-content">
    <h1>Min profil</h1>

    <section class="bruger-section">
      <p><strong>Fornavn:</strong> <span id="profilFornavn"></span></p> <!-- JS indsætter fornavn -->
      <p><strong>Efternavn:</strong> <span id="profilEfternavn"></span></p> <!-- JS indsætter efternavn -->
      <p><strong>Email:</strong> <span id="profilEmail"></span></p> <!-- JS indsætter email -->
    </section>

    <section class="bruger-section">
      <h2>Mine ejendomsprofiler</h2>
      <div id="profilEjendomListe"></div> <!-- JS renderer brugerens ejendomme -->
    </section>

    <section class="bruger-section">
      <h2>Mine investeringscases</h2>
      <p>Kommer senere.</p> <!-- placeholder → ikke implementeret -->
    </section>
  </main>

  <script src="js/storage.js"></script> <!-- henter brugerdata (localStorage) -->
  <script src="js/ui.js"></script> <!-- DOM manipulation -->
  <script src="js/auth.js"></script> <!-- tjekker om bruger er logget ind -->
  <script src="js/ejendom.js"></script> <!-- henter ejendomme fra backend -->
  <script src="js/profil.js"></script> <!-- indsætter data i spans -->
  <script src="js/adresse.js"></script> <!-- ikke direkte brugt her (overflødig) -->
  <script src="js/app.js"></script> <!-- init + event binding -->
</body>
</html>
