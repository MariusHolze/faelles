<!DOCTYPE html>
<html lang="da">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Købsudgifter</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../css/investeringscase.css">
</head>

<body>
  <div id="navbar-container"></div>

  <main class="cases-page">
    <div id="caseTrinIndikator" class="trin-indikator"></div>

    <div class="case-trin-kort">
      <header class="case-trin-kort-top">
        <h1 id="caseTrinTitel">Købsudgifter</h1>
        <p class="case-trin-kort-undertitel">
          Angiv beløb for de faste købsudgifter nedenfor. Værdien 0 kan anvendes, hvis en post ikke medfører en omkostning.
        </p>
        <p id="caseTrinInfo">Valgt investeringscase indlæses...</p>
      </header>

      <form id="caseTrinForm" class="case-trin-form" data-trin="koebsudgifter">
        <div id="koebspostListe" class="koebspost-liste"></div>

        <button id="tilfoejKoebspostKnap" class="sekundaer-knap" type="button">
          + Tilføj udgift
        </button>

        <p class="case-total">Samlet køb og udgifter: <strong id="koebspostTotal">0 kr.</strong></p>

        <p id="caseTrinFejl" class="case-form-fejl"></p>
        <p id="caseTrinStatus" class="case-form-status"></p>

        <div class="case-trin-navigation">
          <a class="forrige-trin-knap" href="../investeringscase.html">← Til oversigt</a>
          <button id="naesteTrinKnap" class="naeste-trin-knap skjult" type="submit" data-action="next">
            Gem og fortsæt →
          </button>
        </div>
      </form>
    </div>
  </main>

  <script src="../js/ui.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/investeringscaseForm.js"></script>
  <script src="../js/app.js"></script>
</body>

</html>
