<!DOCTYPE html>
<html lang="da">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Renovering og forbedringer</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../css/investeringscase.css">
</head>

<body>
  <div id="navbar-container"></div>

  <main class="cases-page">
    <section class="case-form-header">
      <p class="cases-label">Trin 3 af 5</p>
      <h1 id="caseTrinTitel">Renovering og forbedringer</h1>
      <p id="caseTrinInfo">Valgt investeringscase indlæses...</p>
    </section>

    <form id="caseTrinForm" class="case-trin-form" data-trin="renovering">
      <section class="case-help">
        <h2>Hjælp til input</h2>
        <p>
          Tilvælg renovering, hvis casen skal indeholde forbedringer. Angiv hver forbedring
          med beløb og planlagt tidspunkt i investeringsperioden.
        </p>
      </section>

      <label class="case-toggle">
        <input id="renoveringAktiv" type="checkbox">
        <span>Skal der renoveres eller forbedres?</span>
      </label>

      <div id="renoveringDetaljer" class="skjult">
        <div id="renoveringspostListe" class="renoveringspost-liste"></div>

        <button id="tilfoejRenoveringspostKnap" class="sekundaer-knap" type="button">
          + Tilføj forbedring
        </button>

        <p class="case-total">Samlet renovering: <strong id="renoveringTotal">0 kr.</strong></p>
      </div>

      <p id="caseTrinFejl" class="case-form-fejl"></p>
      <p id="caseTrinStatus" class="case-form-status"></p>

      <div class="case-form-actions">
        <a id="forrigeTrinLink" class="sekundaer-link skjult" href="#">Forrige trin</a>
        <button id="naesteTrinKnap" class="case-primary-link skjult" type="submit" data-action="next">
          Gem og gå videre
        </button>
        <button type="submit">Gem</button>
      </div>
    </form>
  </main>

  <script src="../js/storage.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/investeringscaseForm.js"></script>
  <script src="../js/app.js"></script>
</body>

</html>
