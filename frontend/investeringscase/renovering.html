<!DOCTYPE html>
<html lang="da">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Renovering og forbedringer</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../css/investeringscase.css">
</head>

<body>
  <div id="navbar-container"></div>

  <main class="cases-page">
    <div id="caseTrinIndikator" class="trin-indikator"></div>

    <div class="case-trin-kort">
      <header class="case-trin-kort-top">
        <h1 id="caseTrinTitel">Renovering og forbedringer</h1>
        <p class="case-trin-kort-undertitel">
          Planlægger du at renovere eller forbedre ejendommen i investeringsperioden?
        </p>
        <p id="caseTrinInfo">Valgt investeringscase indlæses...</p>
      </header>

      <form id="caseTrinForm" class="case-trin-form" data-trin="renovering">
        <div class="trin-valg-gruppe">
          <button type="button" id="renoveringJaKort" class="trin-valg-kort">
            <div class="trin-valg-ikon-wrapper">🔨</div>
            <div>
              <strong>Ja, der planlægges renovering</strong>
              <p>Tilføj forbedringer med beløb og tidspunkt</p>
            </div>
          </button>
          <button type="button" id="renoveringNejKort" class="trin-valg-kort">
            <div class="trin-valg-ikon-wrapper">✓</div>
            <div>
              <strong>Nej, ingen renovering</strong>
              <p>Ejendommen bruges som den er i perioden</p>
            </div>
          </button>
        </div>

        <input id="renoveringAktiv" type="checkbox" hidden>

        <div id="renoveringDetaljer" class="skjult">
          <div id="renoveringspostListe" class="renoveringspost-liste"></div>

          <button id="tilfoejRenoveringspostKnap" class="sekundaer-knap" type="button">
            + Tilføj forbedring
          </button>

          <p class="case-total">Samlet renovering: <strong id="renoveringTotal">0 kr.</strong></p>
        </div>

        <p id="caseTrinFejl" class="case-form-fejl"></p>
        <p id="caseTrinStatus" class="case-form-status"></p>

        <div class="case-trin-navigation">
          <a id="forrigeTrinLink" class="forrige-trin-knap skjult" href="#">← Forrige trin</a>
          <button id="naesteTrinKnap" class="naeste-trin-knap skjult" type="submit" data-action="next">
            Gem og fortsæt →
          </button>
        </div>
      </form>
    </div>
  </main>

  <script src="../js/ui.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/investeringscaseForm.js"></script>
  <script src="../js/app.js"></script>
</body>

</html>
