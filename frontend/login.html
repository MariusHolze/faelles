<!DOCTYPE html>
<html lang="da">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log ind</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="navbar-container"></div>

    <main class="page-content">
        <div class="container">
            <h1>Log ind</h1>

            <form id="login-form">
                <input type="email" id="loginEmail" placeholder="Skriv din email" required>

                <input type="password" id="loginPassword" placeholder="Skriv din adgangskode" required>

                <button type="submit" class="knap">Log ind</button>
            </form>

            <p id="loginFejl"></p>

            <p class="login-tekst">
                Har du ikke en profil?
                <a href="opretbruger.html">Opret gratis her</a>
            </p>
        </div>
    </main>

    <script src="js/storage.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
