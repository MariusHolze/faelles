<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opret profil</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="navbar">
        <nav>
            <div class="nav-left">
                <a href="index.html">
                    <img src="6676711.png" alt="logo" id="logo">
                </a>
                <a href="omOs.html">Om os</a>
                <a href="kontakt.html">Kontakt</a>
                <a href="learnHow.html">Learn how</a>
            </div>

            <div class="nav-right">
                <a href="login.html" class="login-knap">Log ind</a>
            </div>
        </nav>
    </div>

    <main class="page-content">
        <div id="opret-form">
            <h1>Opret profil</h1>

            <form class="container">
                <div class="container">
                    <p>Fornavn</p>
                    <input 
                        type="text" 
                        id="Fornavn" 
                        name="Fornavn" 
                        maxlength="16" 
                        placeholder="max 16 karakterer"
                        required>
                </div>

                <div class="container">
                    <p>Efternavn</p>
                    <input 
                        type="text" 
                        id="Efternavn" 
                        name="Efternavn" 
                        maxlength="16" 
                        placeholder="max 16 karakterer"
                        required>
                </div>

                <div class="container">
                    <p>Telefonnummer</p>
                    <input 
                        type="tel" 
                        id="Phone" 
                        name="Phone"
                        pattern="[0-9]{8}"
                        placeholder="8 cifre"
                        required>
                </div>

                <div class="container">
                    <p>E-mail</p>
                    <input 
                        type="email" 
                        id="opretEmail" 
                        name="opretEmail" 
                        placeholder="eksempel@eksempel.com" 
                        required>
                </div>

                <div class="container">
                    <p>Har du mange penge?</p>
                    <select id="status" name="status" required>
                        <option value="">--Vælg--</option>
                        <option value="ja">Ja</option>
                        <option value="nej">Nej</option>
                    </select>
                </div>

                <div class="container">
                    <p>Adgangskode</p>
                    <input 
                        type="password" 
                        id="Adgangskode" 
                        name="Adgangskode" 
                        maxlength="16"
                        placeholder="max 16 karakterer" 
                        required>
                </div>

                <div class="container">
                    <button type="submit" id="submitProfil">Opret profil</button>
                </div>
            </form>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
